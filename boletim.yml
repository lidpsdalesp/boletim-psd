name: Assessoria PSD · Agenda & Comissões

on:
  schedule:
    - cron: '1 3 * * 2-6'   # 00h01 BRT (03h01 UTC), seg a sex
    - cron: '0 9 * * 1-5'   # 06h00 BRT (09h00 UTC), seg a sex
  workflow_dispatch:

jobs:
  gerar-assessoria:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências
        run: pip install requests beautifulsoup4 lxml

      - name: Atualiza membros das Comissões Permanentes
        run: python coletor_membros_comissoes.py

      - name: Atualiza membros das CPIs
        run: python coletor_membros_cpis.py

      - name: Gera Assessoria PSD
        run: python gerar_boletim.py

      - name: Commit e push dos arquivos gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add boletins/
          git add docs/
          git add comissoes_membros.json
          git add cpis_membros.json
          git add contador_boletim.txt
          git diff --staged --quiet || git commit -m "auto: assessoria $(TZ=America/Sao_Paulo date +'%d/%m/%Y %H:%M')"
          git push
