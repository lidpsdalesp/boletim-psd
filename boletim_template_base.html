<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessoria PSD · Agenda &amp; Comissões</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --psd-blue:       #1A3A9C;
    --psd-blue-dark:  #0E2270;
    --psd-green:      #4CAF50;
    --psd-gold:       #F5C800;
    --bg:             #F0F4F9;
    --white:          #FFFFFF;
    --text:           #1A1A2E;
    --text-muted:     #5A6A85;
    --border:         #D6E0EF;
    --green-acc:      #0D7A4B;
    --green-bg:       #E6F7F1;
    --red:            #C0392B;
    --red-bg:         #FDECEA;
    --purple:         #5C2D91;
    --purple-bg:      #F0EAF8;
    --orange:         #C05621;
    --orange-bg:      #FEF0E7;
    --shadow:         0 2px 12px rgba(0,40,140,0.10);
    --radius:         10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--psd-blue-dark) 0%, var(--psd-blue) 100%);
    color: white;
    padding: 20px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .header-logo {
    height: 70px; width: auto;
    flex-shrink: 0; display: block;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
  }
  .header-divider {
    width: 1px; height: 52px;
    background: rgba(255,255,255,0.25); flex-shrink: 0;
  }
  .header-title { line-height: 1.35; }
  .header-title h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  .header-title .subtitle { font-size: 12px; opacity: 0.80; margin-top: 2px; }
  .header-title .lider {
    font-size: 12.5px; margin-top: 6px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.22);
    display: inline-block; padding: 3px 10px; border-radius: 20px;
  }
  .header-right { text-align: right; flex-shrink: 0; }
  .boletim-num {
    background: var(--psd-gold); color: var(--psd-blue-dark);
    font-size: 12.5px; font-weight: 800; padding: 4px 14px;
    border-radius: 20px; display: inline-block; margin-bottom: 7px;
  }
  .header-date { font-size: 13px; opacity: 0.92; font-weight: 500; }
  .header-weekday { font-size: 10.5px; opacity: 0.65; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }

  /* ── WRAPPER ── */
  .wrapper { max-width: 860px; margin: 0 auto; padding: 24px 20px 40px; }

  /* ── SECTION ── */
  .section {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-bottom: 1px solid var(--border); background: #F7FAFF;
  }
  .section-icon { font-size: 16px; }
  .section-title { font-size: 12.5px; font-weight: 700; color: var(--psd-blue); text-transform: uppercase; letter-spacing: 0.7px; }
  .section-body { padding: 16px 20px; }

  /* ── AGENDA ── */
  .agenda-item { display: flex; gap: 14px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .agenda-item:last-child { border-bottom: none; padding-bottom: 0; }
  .agenda-time { background: var(--psd-blue); color: white; font-size: 11.5px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .agenda-content { flex: 1; }
  .agenda-name { font-weight: 600; font-size: 13.5px; }
  .agenda-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }

  /* ── BADGE ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; padding: 5px 5px; line-height: 1; border-radius: 20px; white-space: nowrap; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-pl      { background: #EBF2FF; color: var(--psd-blue); line-height: 1; }
  .badge-pdl     { background: var(--orange-bg); color: var(--orange); line-height: 1; }
  .badge-mocao   { background: var(--purple-bg); color: var(--purple); line-height: 1; }
  .badge-decreto { background: var(--red-bg); color: var(--red); line-height: 1; }
  .badge-res     { background: var(--green-bg); color: var(--green-acc); line-height: 1; }
  .badge-psd     { background: var(--psd-gold); color: var(--psd-blue-dark); line-height: 1; }
  .badge-comunicado { background: #F0F4F9; color: var(--text-muted); line-height: 1; }

  /* ── PROPOSITURA ── */
  .prop-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .prop-item:last-child { border-bottom: none; padding-bottom: 0; }
  .prop-item.destaque-psd { background: linear-gradient(90deg, #FFFBEA 0%, white 100%); margin: 0 -20px; padding: 10px 20px; border-left: 3px solid var(--psd-gold); border-bottom: 1px solid var(--border); }
  .prop-item.destaque-psd:last-child { border-bottom: none; }
  .prop-body { flex: 1; }
  .prop-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
  .prop-num { font-size: 12px; font-weight: 700; color: var(--psd-blue); }
  .prop-autor { font-size: 11.5px; color: var(--text-muted); font-weight: 500; }
  .prop-ementa { font-size: 13px; line-height: 1.5; }
  .prop-prazo { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; color: var(--orange); font-weight: 600; margin-top: 4px; }

  /* ── DIÁRIO ── */
  .diario-item { padding: 9px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .diario-item:last-child { border-bottom: none; padding-bottom: 0; }
  .diario-body { flex: 1; }
  .diario-num  { font-size: 11.5px; font-weight: 700; color: var(--text-muted); margin-bottom: 2px; }
  .diario-desc { font-size: 13px; line-height: 1.5; }
  .diario-link { font-size: 11px; color: var(--psd-blue); font-weight: 600; margin-top: 2px; display: inline-block; }

  /* ── SESSÃO ── */
  .sessao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sessao-col { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .sessao-col-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 8px; }
  .sessao-dep { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #F0F4F9; font-size: 12.5px; }
  .sessao-dep:last-child { border-bottom: none; }
  .sessao-dep-num { background: var(--psd-blue); color: white; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 4px; line-height: 1; }
  .sessao-dep-psd { background: var(--psd-gold); color: var(--psd-blue-dark); }
  .sessao-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; margin-bottom: 12px; }
  .sessao-status.sem-ordem { background: var(--orange-bg); color: var(--orange); }
  .sessao-status.com-ordem { background: var(--green-bg); color: var(--green-acc); }

  /* ── COMISSÃO ── */
  .comissao-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .comissao-item:last-child { border-bottom: none; padding-bottom: 0; }
  .comissao-dia-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--psd-blue); color: white; padding: 3px 8px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.4px; text-align: center; line-height: 1.5; }
  .comissao-body { flex: 1; }
  .comissao-nome { font-size: 13px; font-weight: 600; }
  .comissao-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* ── SUB LABEL ── */
  .sub-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); padding: 10px 0 6px; margin-top: 4px; border-top: 1px dashed var(--border); }
  .sub-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  /* ── FOOTER ── */
  .footer { background: linear-gradient(135deg, var(--psd-blue-dark) 0%, var(--psd-blue) 100%); color: white; padding: 18px 36px; display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
  .footer-left p { font-size: 11.5px; opacity: 0.78; margin-bottom: 5px; }
  .footer-left strong { font-size: 13px; font-weight: 700; }
  .footer-team { display: flex; gap: 8px; flex-wrap: wrap; }
  .footer-member { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.20); color: white; font-size: 11.5px; font-weight: 500; padding: 4px 11px; border-radius: 20px; line-height: 1; }


  /* ── AGENDA ITEM PSD ── */
  .agenda-item.psd {
    background: linear-gradient(90deg, #FFFBEA 0%, #FFFFF8 100%);
    border-left: 3px solid var(--psd-gold);
    margin: 0 -20px;
    padding: 10px 20px;
  }
  .agenda-item.psd .agenda-time {
    background: #C8960A;
  }

  @media print {
    body { background: white; }
    .wrapper { padding: 0; max-width: 100%; }
    .section { box-shadow: none; border: 1px solid var(--border); }
    .header, .footer { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
